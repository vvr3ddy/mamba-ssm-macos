name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15  # M4 Mac with Metal support
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests.unit -v

      - name: Run integration tests
        run: uv run python -m unittest tests.integration.test_unified_system -v
